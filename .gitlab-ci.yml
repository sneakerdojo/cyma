image: docker:latest

services:
  - docker:dind

stages:
  - build
  - package

build:
  image: node:22-alpine
  stage: build
  only:
    - main
    - qa
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.33.0 --activate
  script:
    - pnpm install --frozen-lockfile
    - pnpm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day

package:
  stage: package
  only:
    - main
    - qa
  script:
    - docker build -f Prod.Dockerfile
        -t "registry.gitlab.com/octio-dev/octio-website:latest"
        -t "registry.gitlab.com/octio-dev/octio-website:qa"
        -t "registry.gitlab.com/octio-dev/octio-website:$CI_COMMIT_SHORT_SHA" .
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
    - docker push "registry.gitlab.com/octio-dev/octio-website:latest"
    - docker push "registry.gitlab.com/octio-dev/octio-website:qa"
    - docker push "registry.gitlab.com/octio-dev/octio-website:$CI_COMMIT_SHORT_SHA"
