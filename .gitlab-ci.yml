image: docker:latest

services:
  - docker:dind

stages:
  - build
  - package
  - deploy

# =============================================================================
# Build stage — compile the Vite SPA and typecheck the worker
# =============================================================================

build:web:
  image: oven/bun:1.3.3-alpine
  stage: build
  only:
    - main
  script:
    - bun install --frozen-lockfile
    - bun run --filter @octio/web build
  artifacts:
    paths:
      - packages/web/dist/
    expire_in: 1 week

# The worker runtime image is self-contained (its Dockerfile installs deps and
# runs TS directly with Bun), so we don't need to produce a worker artifact.
# We still want to gate `main` on typecheck across @octio/shared + @octio/worker.
typecheck:worker:
  image: oven/bun:1.3.3-alpine
  stage: build
  only:
    - main
  script:
    - bun install --frozen-lockfile
    - bun run --filter @octio/shared typecheck
    - bun run --filter @octio/worker typecheck

# =============================================================================
# Package stage — build images and push to the GitLab Container Registry
# =============================================================================

package:web:
  stage: package
  only:
    - main
  script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
    - docker build -f packages/web/Dockerfile
        -t "registry.gitlab.com/octio-dev/octio-website:latest"
        -t "registry.gitlab.com/octio-dev/octio-website:$CI_COMMIT_SHORT_SHA" .
    - docker push "registry.gitlab.com/octio-dev/octio-website:latest"
    - docker push "registry.gitlab.com/octio-dev/octio-website:$CI_COMMIT_SHORT_SHA"

package:worker:
  stage: package
  only:
    - main
  script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
    - docker build -f packages/worker/Dockerfile
        -t "registry.gitlab.com/octio-dev/octio-website/worker:latest"
        -t "registry.gitlab.com/octio-dev/octio-website/worker:$CI_COMMIT_SHORT_SHA" .
    - docker push "registry.gitlab.com/octio-dev/octio-website/worker:latest"
    - docker push "registry.gitlab.com/octio-dev/octio-website/worker:$CI_COMMIT_SHORT_SHA"

# =============================================================================
# Deploy stage — SSH to target host, docker compose pull/up
# =============================================================================
#
# Both environments run the same image and pull from the same `:latest` tag.
# deploy:qa fires automatically after package on every main commit (internal
# site reachable via WireGuard mesh at octio-website-qa.octio.local). Use it
# to smoke-test the latest image before promoting to prod.
#
# deploy:production is manual — trigger it from the pipeline UI once QA looks
# good. It deploys the exact same image to infra-01 behind https://octio.co.za/.

.deploy-base: &deploy-base
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - |
      if [ -f "$SSH_PRIVATE_KEY" ]; then
        chmod 600 "$SSH_PRIVATE_KEY"
        ssh-add "$SSH_PRIVATE_KEY"
      else
        echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
      fi
    - mkdir -p ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts

deploy:qa:
  <<: *deploy-base
  environment:
    name: qa
  script:
    # Authenticate the remote docker daemon to GitLab Container Registry using
    # the pipeline's ephemeral job token, so `docker compose pull` can fetch
    # private images (web + worker). Token is short-lived and scoped to this
    # job; nothing persists on the host. Stdin = the auth payload so the token
    # never appears in a process list on the remote.
    - |
      printf '%s\n' "$CI_JOB_TOKEN" \
        | ssh -p $DEPLOY_SSH_PORT $DEPLOY_USER@$DEPLOY_HOST_QA \
            "docker login -u gitlab-ci-token --password-stdin $CI_REGISTRY"
    - |
      ssh -p $DEPLOY_SSH_PORT $DEPLOY_USER@$DEPLOY_HOST_QA bash -s <<'REMOTE'
        set -e
        cd /opt/stacks/octio-website-qa
        echo "Pulling latest images..."
        docker compose pull
        echo "Recreating containers..."
        docker compose up -d --force-recreate
        echo "Waiting for web healthcheck..."
        timeout 60 bash -c 'until docker inspect octio-website-qa --format "{{.State.Health.Status}}" 2>/dev/null | grep -q healthy; do sleep 2; done'
        echo "Waiting for worker healthcheck..."
        timeout 60 bash -c 'until docker inspect octio-worker-qa --format "{{.State.Health.Status}}" 2>/dev/null | grep -q healthy; do sleep 2; done'
        # No gateway reload: demo-01 runs Traefik, which re-resolves upstream
        # container IPs via Docker's embedded DNS automatically.
        docker compose ps
        # Wipe the cached registry creds so they don't outlive the pipeline.
        docker logout registry.gitlab.com 2>/dev/null || true
      REMOTE
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never

deploy:production:
  <<: *deploy-base
  environment:
    name: production
  script:
    # Auth the prod docker daemon to GitLab Container Registry — same pattern
    # as deploy:qa, ephemeral CI_JOB_TOKEN piped via stdin, logout at the end.
    - |
      printf '%s\n' "$CI_JOB_TOKEN" \
        | ssh -p $DEPLOY_SSH_PORT $DEPLOY_USER@$DEPLOY_HOST_PROD \
            "docker login -u gitlab-ci-token --password-stdin $CI_REGISTRY"
    - |
      ssh -p $DEPLOY_SSH_PORT $DEPLOY_USER@$DEPLOY_HOST_PROD bash -s <<'REMOTE'
        set -e
        cd /opt/stacks/octio-website-prd
        echo "Pulling latest images..."
        docker compose pull
        echo "Recreating containers..."
        docker compose up -d --force-recreate
        echo "Waiting for web healthcheck..."
        timeout 60 bash -c 'until docker inspect octio-website-prd --format "{{.State.Health.Status}}" 2>/dev/null | grep -q healthy; do sleep 2; done'
        echo "Waiting for worker healthcheck..."
        timeout 60 bash -c 'until docker inspect octio-worker-prd --format "{{.State.Health.Status}}" 2>/dev/null | grep -q healthy; do sleep 2; done'
        # No gateway reload: infra-01 runs Traefik, which re-resolves upstream
        # container IPs via Docker's embedded DNS automatically.
        docker compose ps
        docker logout registry.gitlab.com 2>/dev/null || true
      REMOTE
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
    - when: never
