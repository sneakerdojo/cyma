<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" fill="none">
  <!--
    Octio full logo — icon + wordmark
    Icon: #E8862A (orange), Text: #3D4F5F (dark slate)
  -->

  <!-- Icon (same as octio-icon.svg) -->
  <g stroke="#E8862A" fill="none">
    <path d="M85 225 A110 110 0 1 1 215 225" stroke-width="24" stroke-linecap="round"/>
    <circle cx="127" cy="145" r="11" fill="#E8862A" stroke="none"/>
    <circle cx="173" cy="145" r="11" fill="#E8862A" stroke="none"/>
    <path d="M85 225 C85 250, 70 270, 55 300 Q45 325, 45 340" stroke-width="16" stroke-linecap="round"/>
    <circle cx="45" cy="350" r="18" stroke-width="12"/>
    <path d="M108 230 C108 255, 95 275, 90 310 L90 340" stroke-width="14" stroke-linecap="round"/>
    <circle cx="90" cy="355" r="16" stroke-width="11"/>
    <path d="M130 232 L130 355 Q130 380, 140 380" stroke-width="13" stroke-linecap="round"/>
    <circle cx="140" cy="395" r="14" stroke-width="10"/>
    <path d="M160 232 L160 340 Q160 365, 170 365" stroke-width="13" stroke-linecap="round"/>
    <circle cx="170" cy="375" r="14" stroke-width="10"/>
    <path d="M192 230 C192 255, 205 275, 210 310 L215 330" stroke-width="14" stroke-linecap="round"/>
    <circle cx="218" cy="345" r="16" stroke-width="11"/>
    <path d="M215 225 C215 250, 230 270, 245 300 Q255 325, 255 340" stroke-width="16" stroke-linecap="round"/>
    <circle cx="255" cy="350" r="18" stroke-width="12"/>
  </g>

  <!-- Wordmark "octio" — rounded geometric lowercase, vertically centered with head -->
  <g fill="#3D4F5F">
    <!-- "o" -->
    <path d="M340 105 a55 55 0 1 0 0 110 a55 55 0 1 0 0-110 Z M340 135 a25 25 0 1 1 0 50 a25 25 0 1 1 0-50 Z"/>
    <!-- "c" -->
    <path d="M497 105 a55 55 0 0 0 0 110 l2 0 l0-30 l-2 0 a25 25 0 0 1 0-50 l2 0 l0-30 l-2 0 Z"/>
    <!-- "t" -->
    <path d="M565 60 l0 155 a30 30 0 0 0 30 30 l0-30 a0 0 0 0 1 0 0 l0-125 l25 0 l0-30 l-25 0 l0-30 l-30 0 Z"/>
    <!-- "i" — dot + stem -->
    <circle cx="655" cy="70" r="16"/>
    <rect x="640" y="105" width="30" height="110" rx="4"/>
    <!-- "o" (second) -->
    <path d="M720 105 a55 55 0 1 0 0 110 a55 55 0 1 0 0-110 Z M720 135 a25 25 0 1 1 0 50 a25 25 0 1 1 0-50 Z"/>
  </g>
</svg>
